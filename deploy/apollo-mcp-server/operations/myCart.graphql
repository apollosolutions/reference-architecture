# Fetches the authenticated user's shopping cart with full product details.
# Requires an Authorization header with a valid Bearer token.
query MyCart {
  me {
    id
    cart {
      items {
        product {
          id
          upc
          title
          description
          mediaUrl
          releaseDate
          variants {
            id
            price
            colorway
            size
            dimensions
            weight
          }
          reviews {
            id
            body
          }
        }
      }
    }
  }
}
