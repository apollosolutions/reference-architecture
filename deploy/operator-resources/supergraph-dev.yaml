apiVersion: apollographql.com/v1alpha2
kind: Supergraph
metadata:
  name: reference-architecture-dev
  namespace: apollo
spec:
  replicas: 3
  podTemplate:
    routerVersion: 2.11.0
    env:
      - name: APOLLO_ROUTER_LOG
        value: "debug"
      - name: OTEL_SERVICE_NAME
        value: "router"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  schema:
    resource:
      name: reference-architecture-dev
      namespace: apollo
  routerConfig:
    supergraph:
      listen: 0.0.0.0:4000
      introspection: true
    response_cache:
      enabled: true
      debug: true
      subgraph:
        all:
          enabled: true
          ttl: 5m
          redis:
            urls: ["redis://redis-master.redis.svc.cluster.local:6379"]
    headers:
      all:
        request:
          - propagate:
              matching: .*
    authentication:
      router:
        jwt:
          jwks:
            - url: http://graphql.users.svc.cluster.local:4001/.well-known/jwks.json
    authorization:
      directives:
        enabled: true
    cors:
      allow_any_origin: true
    coprocessor:
      url: http://coprocessor.apollo.svc.cluster.local:8081
      timeout: 2s
      router:
        request:
          headers: true
      subgraph:
        all:
          request:
            headers: true
          response:
            headers: true
    health_check:
      listen: 0.0.0.0:8088
    sandbox:
      enabled: true
    homepage:
      enabled: false
    include_subgraph_errors:
      all: true
    telemetry:
      apollo:
        subgraph_metrics: true
      instrumentation:
        instruments:
          default_requirement_level: required
          cache: # Cache instruments configuration
            apollo.router.response.cache: # A counter which counts the number of cache hit and miss for subgraph requests
              attributes:
                graphql.type.name: true # Include the entity type name. default: false
                subgraph.name: # Custom attributes to include the subgraph name in the metric
                  subgraph_name: true
          router:
            http.server.request.duration:
              attributes:
                graphql.operation.name:
                  operation_name: string
                graphql.errors:
                  on_graphql_error: true
            http.server.request.body.size: true
            http.server.response.body.size: true
            http.server.active_requests: true
          subgraph:
            http.client.request.duration:
              attributes:
                subgraph.name: true
            http.client.request.body.size:
              attributes:
                subgraph.name: true
            http.client.response.body.size: true
      exporters:
        tracing:
          otlp:
            enabled: true
            endpoint: http://collector.monitoring.svc.cluster.local:4318
            protocol: http
        metrics:
          otlp:
            enabled: true
            endpoint: http://collector.monitoring.svc.cluster.local:4318
            protocol: http
    experimental_diagnostics:
      enabled: true
      listen: 0.0.0.0:8089
      output_directory: /tmp/router-diagnostics
    plugins:
      experimental.expose_query_plan: true
